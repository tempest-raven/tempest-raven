<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="(isHandset$ | async) ? 'over' : 'side'"
      [opened]="(isHandset$ | async) === false">
    <mat-toolbar>
      Menu
    </mat-toolbar>
    
    @for (gameRoutes of routes; track gameRoutes) {
      <mat-toolbar>
        {{ gameRoutes.title }}
      </mat-toolbar>
      
      <mat-nav-list> 
      @for (route of gameRoutes.children; track route) {
          <a mat-list-item [routerLink]="route.fullPath" routerLinkActive #rla="routerLinkActive" [activated]="rla.isActive" >{{route.title}}</a>
      }
      </mat-nav-list>
    }
  </mat-sidenav>
  <mat-sidenav-content class="sidenav-content">
    <mat-toolbar class="mat-primary">
      @if (isHandset$ | async) {
        <button
          type="button"
          aria-label="Toggle sidenav"
          mat-icon-button
          (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
      }
      <span>
        {{ (activatedRoute.title | async ) ?? appName }}
      </span>
    </mat-toolbar>
    <!-- Add Content Here -->
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
